---
images:
  sdr:
    repository: ghcr.io/charlie-foxtrot/rtlsdr-airband
    tag: v5.0.12
    pullPolicy: IfNotPresent
  transcriber:
    repository: ghcr.io/lonk42/wavebrowser-processor
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ghcr.io/lonk42/wavebrowser-web
    tag: latest
    pullPolicy: IfNotPresent
  flagger:
    repository: ghcr.io/lonk42/wavebrowser-flagger
    tag: latest
    pullPolicy: IfNotPresent

# Shared recordings volume. MUST be ReadWriteMany: the sdr pod writes to it
# while the transcriber and web pods read from it, and they may land on
# different nodes.
recordings:
  # Set to an RWX-capable storage class (e.g. nfs-client). Empty uses the
  # cluster default, which is usually RWO and will NOT work for multiple pods.
  storageClassName: ""
  storage: 10Gi
  # ReadWriteMany so sdr/transcriber/web can share it across nodes. On a
  # single-node cluster with an RWO-only provisioner (e.g. local-path), set
  # this to ReadWriteOnce — all pods land on the same node and can share it.
  accessMode: ReadWriteMany

sdr:
  # Pin to the node with the USB SDR dongle attached.
  nodeSelector: {}
  # Passing the USB bus through requires a privileged container and a hostPath
  # mount of the device node.
  privileged: true
  usbHostPath: /dev/bus/usb
  resources: {}
  # Contents of rtl_airband.conf, rendered into a ConfigMap. See
  # rtl_airband.conf.example in the repo root.
  config: |
    devices: ({
      type = "rtlsdr";
      index = 0;
      gain = 30.0;
      mode = "multichannel";
      sample_rate = 2.56;
      buffers = 10;
      centerfreq = 146.650;
      channels: (
        # Recording channel: auto squelch + split_on_transmission, so each
        # transmission becomes its own MP3 and the channel stays gated (silent)
        # between transmissions. This is what drives the recordings.
        {
          freq = 146.950;
          outputs: (
            {
              type = "file";
              directory = "/recordings/";
              filename_template = "r";
              include_freq = true;
              dated_subdirectories = true;
              split_on_transmission = true;
            }
          );
        },
        # Live channel: a second demodulator on the SAME frequency with the
        # squelch forced open (squelch_threshold set below the noise floor) so
        # it streams continuously — including idle band noise — to Icecast for
        # the webapp's "Listen Live" feature. Kept separate from the recording
        # channel above so always-on streaming does not interfere with the
        # squelch-gated recordings; costs roughly one extra narrowband
        # demodulator's worth of CPU. server/password reference the chart's
        # Icecast deployment (rendered via tpl in sdr-configmap.yaml). Remove
        # this channel if icecast.enabled is false.
        {
          freq = 146.950;
          squelch_threshold = -80;
          outputs: (
            {
              type = "icecast";
              server = "{{ .Release.Name }}-icecast";
              port = 8000;
              mountpoint = "live.mp3";
              name = "wavebrowser-live";
              username = "source";
              password = "{{ .Values.icecast.sourcePassword }}";
            }
          );
        }
      );
    });

transcriber:
  # Pin to the GPU node.
  nodeSelector: {}
  # Set if your cluster requires a runtime class for GPU pods (e.g. "nvidia").
  runtimeClassName: ""
  # Number of GPUs to request/limit (nvidia.com/gpu).
  gpu: 1
  resources: {}
  # Persistent cache for downloaded whisper model weights so they are not
  # re-downloaded on every restart.
  modelCache:
    storageClassName: ""
    storage: 5Gi
  env:
    WHISPER_MODEL: large-v3
    WHISPER_DEVICE: cuda
    # int8_float16 keeps large-v3 around ~3.5GB; use float16 (~5GB) for max
    # accuracy or int8 (~3GB) for the smallest footprint.
    WHISPER_COMPUTE_TYPE: int8_float16
    WHISPER_LANGUAGE: en
    TRANSCRIPTION_KEY: whisper
    RECORDINGS_DIR: /recordings
    # Delete recordings that transcribe to nothing (silence/static blips) so
    # they don't accumulate on the shared volume. Set "false" to keep them.
    PRUNE_EMPTY: "true"
    # Safety-net rescan interval (seconds). The inotify watcher can silently go
    # deaf (e.g. event-queue overflow during a burst), so the transcriber also
    # periodically reconciles the recordings dir and picks up anything the
    # watcher missed. Set "0" to rely on inotify alone.
    SWEEP_INTERVAL: "300"

web:
  replicas: 1
  nodeSelector: {}
  resources: {}
  service:
    type: ClusterIP
    port: 8080
  env:
    TRANSCRIPTION_KEY: whisper
    RECORDINGS_DIR: /recordings
    # STREAM_URL is injected by web-deployment.yaml when icecast.enabled.
    # Color-password gate: a playful wall shown to new visitors who must pick or
    # type the correct hex color to enter. Validated server-side (the answer
    # never ships to the browser); a SHA-256 of the color is stored in an
    # httpOnly cookie. Off by default. PASSWORD_GATE_SECRET (optional) salts the
    # token hash.
    PASSWORD_GATE_ENABLED: "false"
    PASSWORD_GATE_MESSAGE: "Tune to the right frequency — match the signal color to enter."
    PASSWORD_GATE_COLOR: "#bef24a"

# Interesting-message flagger: a CPU-only pod that reads transcription text from
# MongoDB and scores transmissions with a small local LLM, promoting the top few
# per UTC day to an "interesting" badge. Off by default because it needs a GGUF
# model on its PVC (either via model.url below or placed manually). No GPU, no
# recordings volume — reads/writes MongoDB only. See transcriber/flagger/README.md.
flagger:
  enabled: false
  nodeSelector: {}
  # Size to the chosen model's peak RSS. Qwen3-4B Q4 peaks ~3GB while scoring a
  # day; idle it's ~tens of MB.
  resources:
    limits:
      memory: 4Gi
  model:
    storageClassName: ""
    storage: 4Gi
    # File placed on the PVC and pointed at by FLAG_MODEL_PATH.
    filename: model.gguf
    # One-time GGUF download URL. When set, an initContainer fetches it to the PVC
    # on first start; leave empty to place the file manually. Default: the model
    # the scored pipeline was validated on (Qwen3-4B-Instruct-2507 Q4_K_M, ~2.4GB).
    url: "https://huggingface.co/bartowski/Qwen_Qwen3-4B-Instruct-2507-GGUF/resolve/main/Qwen_Qwen3-4B-Instruct-2507-Q4_K_M.gguf"
  # Passed through as environment variables (see transcriber/flagger/README.md).
  # FLAG_MODEL_PATH / MONGODB_* are injected by the chart, don't set them here.
  env:
    TRANSCRIPTION_KEY: whisper
    # SCORE_PROMPT is the entire scoring rubric (one block). Omit to use the
    # built-in generic default; override to tune it to your own feed. The tuned
    # rubric is deployment-private — supply it via a values override, never commit
    # it (this repo is public). FLAG_PROMPT is accepted as a legacy alias.
    # SCORE_PROMPT: "You are curating a 'most interesting moments' badge for short radio transmissions. Score each 0-9; only the top handful per day deserve it. ..."
    FLAG_PROMPT_VERSION: "2"
    SCORE_BATCH: "12"
    TOPN: "20"                 # daily flag budget; the recall/noise dial
    PASS_ORDERS: "0,7,13"      # 0 = chronological, others = shuffle seeds
    FLAG_THREADS: "4"          # PHYSICAL cores — SMT is markedly slower
    FLAG_N_CTX: "2048"
    FLAG_POLL_INTERVAL: "300"

# Internal Icecast server for the live "Listen Live" stream. The sdr pod
# publishes to it (see the icecast output in sdr.config) and the web pod proxies
# it to the browser via /api/stream. ClusterIP only — never exposed directly.
icecast:
  enabled: true
  nodeSelector: {}
  image:
    repository: libretime/icecast
    tag: "2.4.4"
    pullPolicy: IfNotPresent
  # Mountpoint of the live stream (no leading slash). Must match the mountpoint
  # in sdr.config above.
  mountpoint: live.mp3
  # CHANGE ME. Used by both the Icecast server and the sdr icecast output. Like
  # the rest of sdr.config this lands in a ConfigMap in plaintext; promote to a
  # Secret if that matters in your environment.
  sourcePassword: hackme
  adminPassword: hackme
  resources: {}

# Self-hosted MongoDB via the Bitnami subchart. Set enabled: false to use an
# external instance (provide externalMongodb.uri below).
mongodb:
  enabled: true
  auth:
    # CHANGE ME. Used both by the subchart and to build the connection URI.
    rootPassword: transcriber
  persistence:
    size: 10Gi

# Used only when mongodb.enabled is false.
externalMongodb:
  uri: ""

# Database name used by the app/transcriber.
mongoDatabase: transcriber

ingress:
  enabled: false
  className: ""
  annotations: {}
  # TLS blocks, passed through verbatim to the Ingress spec, e.g.:
  #   tls:
  #     - hosts: [wavebrowser.example.com]
  #       secretName: wavebrowser-tls
  tls: []
  # When true (and using Traefik), render a Middleware + IngressRoute that
  # redirect the hosts below from HTTP to HTTPS. See
  # templates/ingressroute-redirect.yaml.
  redirectToHttps: false
  hosts:
    - host: wavebrowser.example.com
      paths:
        - path: /
          pathType: Prefix
