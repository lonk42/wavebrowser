---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wavebrowser.fullname" . }}-web
  labels:
    {{- include "wavebrowser.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "wavebrowser.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            {{- range $k, $v := .Values.web.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.icecast.enabled }}
            # Internal Icecast URL the /api/stream proxy pulls the live feed from.
            - name: STREAM_URL
              value: "http://{{ include "wavebrowser.fullname" . }}-icecast:8000/{{ .Values.icecast.mountpoint }}"
            {{- end }}
            - name: MONGODB_DB
              value: {{ .Values.mongoDatabase | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "wavebrowser.fullname" . }}-mongo
                  key: MONGODB_URI
          volumeMounts:
            - name: recordings
              mountPath: {{ .Values.web.env.RECORDINGS_DIR | default "/recordings" }}
              readOnly: true
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      volumes:
        - name: recordings
          persistentVolumeClaim:
            claimName: {{ include "wavebrowser.fullname" . }}-recordings
