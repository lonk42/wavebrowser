---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wavebrowser.fullname" . }}-sdr-config
  labels:
    {{- include "wavebrowser.labels" . | nindent 4 }}
data:
  # Rendered through tpl so sdr.config may reference release-derived values
  # (e.g. the Icecast service name/password). rtl_airband.conf uses single
  # braces, so only {{ "{{ }}" }} expressions are substituted.
  rtl_airband.conf: |
    {{- tpl .Values.sdr.config . | nindent 4 }}
