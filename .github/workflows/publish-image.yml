name: Build and publish images

# Builds the transcriber and webapp container images and pushes them to GitHub
# Container Registry (ghcr.io) whenever a release tag is pushed. Tags of the
# form "v1.2.3" or bare semver "1.2.3" are both accepted; the leading "v" is
# stripped from the resulting image tags by the metadata step.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: transcriber
            file: transcriber/Dockerfile
            suffix: processor
          - context: webapp
            file: webapp/Dockerfile
            suffix: web
          # CPU-only flagger: same build context as the transcriber but a
          # different Dockerfile (slim CPU base, no CUDA).
          - context: transcriber
            file: transcriber/Dockerfile.flagger
            suffix: flagger
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
